name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist build/package/config
          binary_name="mihctl"
          archive_base="mihctl_${VERSION}_${GOOS}_${GOARCH}"
          binary_path="build/package/${binary_name}"

          go build -o "${binary_path}" ./cmd/mihctl
          cp config/* build/package/config/
          tar -C build/package -czf "dist/${archive_base}.tar.gz" "${binary_name}" config

      - name: Upload built archives
        uses: actions/upload-artifact@v4
        with:
          name: release-archives-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  publish:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f -name '*.tar.gz' -exec mv {} release/ \;

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/checksums.txt

  homebrew:
    needs: publish
    uses: ./.github/workflows/update-homebrew-tap.yml
    with:
      version: ${{ github.ref_name }}
    secrets:
      TAP_PUSH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
